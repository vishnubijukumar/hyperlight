# Hyperlight guests use `entrypoint` from `hyperlight-guest-bin` (not `main` / `_start`).
# `s390x-unknown-linux-gnu` normally links `Scrt1.o`, which expects `main` and
# `__libc_start_main`; `-nostartfiles` skips CRT startup so `-eentrypoint` is enough.
#
# With `-nodefaultlibs` (from rustc), `memmove` and friends are not linked automatically;
# `-lc` pulls them from the host libc. (We stub `srand` in this crate instead of musl.)
[target.s390x-unknown-linux-gnu]
# `panic=abort` for our crates; sysroot `liballoc` still references EH symbols — stubbed in `main.rs`.
rustflags = [
    "-C", "panic=abort",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-eentrypoint",
    "-C", "link-arg=-lc",
]
